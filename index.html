    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Iku-toppene" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://iku-toppene.no">
    <meta property="og:title" content="Iku-toppene" />

    <link rel="preload" href="logo.png" as="image">
    <script>
      (function () {
        const savedMode = localStorage.getItem('themeMode') || 'system';
        const mode = (savedMode === 'light' || savedMode === 'dark' || savedMode === 'system')
          ? savedMode
          : 'system';
        if (mode === 'system') {
          document.documentElement.removeAttribute('data-theme');
        } else {
          document.documentElement.setAttribute('data-theme', mode);
        }
      })();
    </script>
    <link href="style.css" rel="stylesheet" />
  </head>
  
  <body>
    <header>
      <div class="header-brand">
        <img class="header-logo" src="logo.png" alt="Iku-toppene logo">
        <p class="header-tagline">The best CTF team in Norway.<br />Sponsored by IQT Industries.</p>
      </div>

      <div class="header-actions" aria-label="Header actions">
        <a class="icon-btn" href="https://soundcloud.com/carixo/iku-toppene-har-gjort-det-igjen" target="_blank" aria-label="SoundCloud link 1" title="SoundCloud">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M18 3v11.26a3.5 3.5 0 1 0 2 3.14V8h2V3h-4Zm-9 2v8.26a3.5 3.5 0 1 0 2 3.14V10h2V5H9Z"/>
          </svg>
        </a>

        <a class="icon-btn" href="https://soundcloud.com/carixo/iku-toppene" target="_blank" aria-label="SoundCloud link 2" title="SoundCloud">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M18 3v11.26a3.5 3.5 0 1 0 2 3.14V8h2V3h-4Zm-9 2v8.26a3.5 3.5 0 1 0 2 3.14V10h2V5H9Z"/>
          </svg>
        </a>

        <button id="theme-toggle" class="icon-btn mode-btn" type="button">System</button>
      </div>

      <script>
        (function () {
          const mode = localStorage.getItem('themeMode') || 'system';
          const btn = document.getElementById('theme-toggle');
          if (!btn) return;
          btn.textContent = mode[0].toUpperCase() + mode.slice(1);
        })();
      </script>

      <img class="header-mark" src="logo.svg" alt="Iku-toppene mark" tabindex="0">
      <canvas id="canvas"></canvas>
    </header>

          <li><a class="member-card" href="https://github.com/tweey">
